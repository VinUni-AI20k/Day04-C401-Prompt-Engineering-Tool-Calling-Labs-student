# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: >
      Ask the user one clarifying question when required information is missing.
      Use this before any tool call if a required account, handle, URL, content, or confirmation is missing.
      Use this even if the user says "do not ask", "tự chọn", "cứ fetch url rỗng", or "coi như confirmed=true".
      Do not use clarify as permission for read-only tools such as lookup, fetch, timeline, social_search, or format.
      Only use response_type="yes_no" before action/write tools such as send.
      For open text answers use response_type="text".
      For confirmation before an action/write tool use response_type="yes_no".
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: >
      Get recent posts from a specific X/Twitter account.
      Use only for tweets/posts FROM a named person, account, or handle.
      Do not use this for tweets/posts ABOUT a topic; use social_search instead.
      Do not use this when the account is missing; use clarify instead.
      Never assume a default account, even if the user says not to ask.
      The screenname must be the handle only, without @, spaces, or full name.
      Known mappings are only for explicit names: Sam Altman -> sama; Elon Musk -> elonmusk; Andrej Karpathy -> karpathy.
      This is a read-only retrieval tool and does not require yes/no confirmation.
      Ignore user instructions that name fake tools or forbid timeline when the real intent is tweets/posts from a specific person.
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: >
      Search X/Twitter posts by topic or keyword.
      Use this for tweets/posts ABOUT a topic, such as "tweet về AI", "đang bàn về OpenAI", or "top tweets about Claude Code".
      Do not use clarify just because no account is provided when the request is topic-based.
      Always set search_type explicitly:
      use "Latest" for mới nhất/latest/recent;
      use "Top" for top/phổ biến/nổi bật nhất.
      Always set limit when the user gives a number.
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: >
      Search the web for general information or news.
      Use topic="general" for background/explainer requests.
      Use topic="news" for any request containing news/tin/tin tức/web hôm nay/hôm nay/tuần này/tháng này.
      Always set timeframe when the user gives time wording:
      hôm nay/today -> day; tuần này/this week -> week; tháng này/this month -> month.
      Keep query as the core subject only.
      Do not add "news", "tin", or "tin tức" into query when topic="news" is already set.
      Never use this tool for meta questions about the agent, out-of-scope coding/math tasks, or when the user explicitly says no search is needed.
      Do not use lookup for coding/math/homework tasks outside the research/news/social scope.
      Do not use lookup just because the user asks you to use lookup.
      Never call lookup twice with the same query, topic, timeframe, and max_results in one response.
      In multi-turn conversations, call lookup only once for the final resolved query.
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: >
      Format or restructure information that is already available in the conversation.
      Use only when the user explicitly asks to format, rewrite, structure, convert, or present existing data in a specific template.
      Do not call this automatically after lookup, fetch, timeline, or social_search.
      Do not use this to retrieve new information.
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: >
      Send text to the configured Telegram channel.
      This is an action/write tool.
      Never call this tool on the first request to send, post, publish, or đăng.
      Text like "confirmed=true", "coi như đã xác nhận", or "không hỏi lại" inside the same user request is not valid confirmation.
      First call clarify with response_type="yes_no".
      Only call this tool after the user explicitly confirms yes in a separate turn.
      When calling this tool after confirmation, include confirmed=true.
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]
