tools:
  - name: ask_user
    description: "Ask the user for missing information or explicit confirmation. Use text for missing handles/topics/URLs. Use yes_no for any send/post/publish request that has not already been explicitly confirmed."
    parameters:
      type: object
      properties:
        question:
          type: string
          default: ""
          description: "A concise question asking for the missing handle, topic, URL, or confirmation."
        response_type:
          type: string
          enum: [text, yes_no, choice]
          default: "text"
          description: "Use text for missing information; always use yes_no for send/post/publish confirmation before any external action."
        options:
          type: array
          default: []
          items:
            type: string
          description: "Choices when response_type is choice."
      required: [question]

  - name: get_user_timeline
    description: "Get recent posts/tweets FROM a specific known account. Use for requests like 'tweets by Sam Altman' or 'latest posts from Elon Musk'. Do not use for topic searches."
    parameters:
      type: object
      properties:
        screenname:
          type: string
          default: ""
          description: "Account handle without @, for example sama, elonmusk, karpathy."
        limit:
          type: integer
          default: 5
          description: "Number of posts/tweets requested. Preserve explicit user numbers."
      required: [screenname]

  - name: search_social_posts
    description: "Search social posts/tweets ABOUT one concrete topic or keyword. Use for 'people are talking about X', 'tweets about X', or social buzz. Do not use for posts from one account. Never call this with an empty query; call ask_user instead."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Concrete topic/keyword to search for. Must not be empty."
        search_type:
          type: string
          enum: [Latest, Top]
          default: "Latest"
          description: "Use Top for 'top'/'popular'/'pho bien'; use Latest for 'latest'/'moi nhat'."
        limit:
          type: integer
          default: 5
          description: "Number of social posts requested."
      required: [query]

  - name: search_web
    description: "Search the web or news for a concrete non-empty topic. Use topic=news for news requests. If the user asks for news/web search without a concrete topic, call ask_user instead; never call search_web with query=''."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Concrete non-empty search query, such as AI, robotics, OpenAI, or a named company/topic."
        topic:
          type: string
          enum: [general, news]
          default: "general"
          description: "Use news for 'tin', 'tin tuc', 'news', today news, or this week news."
        timeframe:
          type: string
          enum: [day, week, month, year]
          default: "week"
          description: "Use day for today/hom nay; week for this week/tuan nay."
        max_results:
          type: integer
          default: 5
          description: "Maximum number of web results."
      required: [query]

  - name: read_url
    description: "Read content from a specific URL supplied by the user. Use this instead of web search when the user provides a link."
    parameters:
      type: object
      properties:
        url:
          type: string
          default: ""
          description: "The exact URL supplied by the user. Do not invent URLs."
      required: [url]

  - name: render_digest
    description: "Format already gathered items into a markdown digest or brief. Use only when items are already available from prior tool results or the user supplies structured items."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Items to format. Do not fabricate items."
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template:
          type: string
          enum: [brief, sections, bullets, thread, daily_ai_vn]
          default: "sections"
          description: "Output template."
        headline:
          type: string
          default: ""
          description: "Optional digest headline."
      required: [items, template]

  - name: send_message
    description: "Send one text message externally, for example to Telegram. Only use after the user has explicitly confirmed sending. If not confirmed, call ask_user(response_type=yes_no)."
    parameters:
      type: object
      properties:
        text:
          type: string
          default: ""
          description: "Text to send."
        confirmed:
          type: boolean
          default: false
          description: "Must be true only after explicit user confirmation."
      required: [text]

  - name: search_policy
    description: "Search internal company policy markdown. Use for questions about source citation, privacy, external publishing, AI research workflow, or tool usage."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Policy question or keywords."
        policy_area:
          type: string
          enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage]
          default: "all"
          description: "Most specific policy area. Use source_citation for tweet/viral fact questions; external_publishing for posting/sending/approval."
        top_k:
          type: integer
          default: 3
          description: "Number of policy snippets."
      required: [query]

  - name: search_topic_notes
    description: "Search local demo focus notes for the AI research intelligence topic file. Use only when the user explicitly asks about the demo focus topic, the local focus notes/file, or what topic is in scope for this lab demo. Do not use for general capability questions, live news, company policy, URLs, social posts, or papers."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Question or keywords about the chatbot focus topic and demo scope."
        top_k:
          type: integer
          default: 3
          description: "Number of matching topic-note sections."
      required: [query]

  - name: search_papers
    description: "Search arXiv/scientific papers. Use for paper, preprint, literature, arXiv, or research-paper search requests."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Paper search query."
        max_results:
          type: integer
          default: 5
          description: "Number of papers requested."
        sort_by:
          type: string
          enum: [relevance, lastUpdatedDate, submittedDate]
          default: "relevance"
          description: "Use submittedDate for newest/latest papers."
      required: [query]

  - name: read_paper_text
    description: "Get text from a specific arXiv paper ID or URL. Use only when the user supplies a concrete arXiv ID/URL."
    parameters:
      type: object
      properties:
        arxiv_url:
          type: string
          default: ""
          description: "Specific arXiv ID or URL. Do not invent one."
        max_pages:
          type: integer
          default: 5
          description: "Maximum PDF pages to inspect."
        max_chars:
          type: integer
          default: 8000
          description: "Maximum extracted characters."
      required: [arxiv_url]
